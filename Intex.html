<!DOCTYPE html>
<html>
<head>
    <title>My Gallery</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        h1 {
            padding: 20px;
            color: #00ffcc;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Popup */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .popup img {
            max-width: 90%;
            max-height: 90%;
        }

        .popup:active {
            display: none;
        }
    </style>
</head>

<body>

<h1>📸 My Photo Gallery</h1>

<div class="gallery">
    <img src="https://picsum.photos/300/200?1" onclick="openImg(this.src)">
    <img src="https://picsum.photos/300/200?2" onclick="openImg(this.src)">
    <img src="https://picsum.photos/300/200?3" onclick="openImg(this.src)">
    <img src="https://picsum.photos/300/200?4" onclick="openImg(this.src)">
    <img src="https://picsum.photos/300/200?5" onclick="openImg(this.src)">
    <img src="https://picsum.photos/300/200?6" onclick="openImg(this.src)">
</div>

<div class="popup" id="popup" onclick="closeImg()">
    <img id="popup-img">
</div>

<script>
function openImg(src) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = src;
}

function closeImg() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
